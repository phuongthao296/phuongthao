<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Kết quả phản hồi</title>
</head>
<body>
    <p id="kq"></p>

    <script>
        // 1. Lấy dữ liệu từ URL
        let params = new URLSearchParams(window.location.search);
        let ten = params.get("txtTen") || "Khách";
        let yk = params.get("txtComment") || "(Chưa có nội dung)";

        // 2. Sửa lỗi cú pháp document.getElementById("kq") 
        // Và chèn thêm biến 'yk' để hiển thị ý kiến người dùng
        document.getElementById("kq").innerHTML = "Cảm ơn bạn <b>" + ten + "</b> đã góp ý."
            + "<br><br>Chúng tôi xin ghi nhận ý kiến của bạn như sau:<br><i>" + yk + "</i>";
    </script>
</body>
</html>
